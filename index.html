<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PropSwipe">
<meta name="theme-color" content="#06060f">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<title>PropSwipe</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --gold:#F5C518;--gold2:#D4940A;--gold3:#FF9500;
  --bg:#06060f;
  --yes:#00D68F;--yes2:#00A36C;
  --no:#FF4757; --no2:#C0392B;
  --text:#EEE9FF;--muted:#4a4a6a;
  --card:#0e0e20;
  --r:22px;
}

html,body{height:100%;overflow:hidden;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text)}

/* ── CANVAS BG ── */
canvas#bg{position:fixed;inset:0;z-index:0;pointer-events:none}

.app{
  position:relative;z-index:1;
  height:100dvh;
  display:flex;flex-direction:column;
  max-width:420px;margin:0 auto;
  padding:env(safe-area-inset-top,16px) 18px calc(14px + env(safe-area-inset-bottom,0px));
  gap:10px;
}

/* ── HEADER ── */
.header{display:flex;align-items:center;justify-content:space-between;flex-shrink:0;padding:2px 0}

.logo{
  font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:5px;
  background:linear-gradient(135deg,var(--gold) 0%,var(--gold3) 60%,var(--gold2) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 8px rgba(245,197,24,.35));
  line-height:1;
}
.logo-sub{font-size:8px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-top:1px}

.balance-pill{
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:100px;padding:6px 16px;
  text-align:center;
  backdrop-filter:blur(12px);
}
.balance-label{font-size:8px;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted)}
.balance-val{
  font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:1px;
  background:linear-gradient(135deg,var(--gold),var(--gold3));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.flash{animation:pulse .45s ease}

/* ── CARD AREA ── */
.card-area{flex:1;display:flex;align-items:center;justify-content:center;min-height:0;position:relative}
.card-stack{position:relative;width:100%;height:100%;max-height:420px}

.ghost{
  position:absolute;inset:0;border-radius:var(--r);
  background:linear-gradient(160deg,#12122a,#0a0a18);
  border:1px solid rgba(255,255,255,.05);
}
.ghost-1{transform:scale(.94) translateY(10px);opacity:.7}
.ghost-2{transform:scale(.88) translateY(20px);opacity:.4}

.bet-card{
  position:absolute;inset:0;border-radius:var(--r);
  background:linear-gradient(160deg,#14142c 0%,#0f0f22 50%,#0b0b1a 100%);
  border:1px solid rgba(120,100,255,.15);
  display:flex;flex-direction:column;overflow:hidden;
  cursor:grab;will-change:transform;touch-action:none;
  box-shadow:
    0 30px 80px rgba(0,0,0,.7),
    0 0 0 1px rgba(255,255,255,.04) inset,
    0 1px 0 rgba(255,255,255,.08) inset;
}
.bet-card:active{cursor:grabbing}
.bet-card.snap{transition:transform .35s cubic-bezier(.25,.46,.45,.94),opacity .35s ease}

/* top shimmer line */
.card-shimmer{
  height:2px;flex-shrink:0;
  background:linear-gradient(90deg,transparent,rgba(180,140,255,.6) 30%,rgba(245,197,24,.8) 60%,transparent);
}

.card-body{display:flex;flex-direction:column;padding:18px 20px 20px;gap:14px;flex:1}

.card-top{display:flex;justify-content:space-between;align-items:center}

.badge{
  font-size:9px;letter-spacing:2.5px;text-transform:uppercase;font-weight:700;
  padding:5px 13px;border-radius:100px;
  background:rgba(180,140,255,.1);border:1px solid rgba(180,140,255,.25);
  color:#b48cff;
}
.vol{
  font-size:10px;color:var(--muted);
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);
  padding:4px 10px;border-radius:100px;
}

.question{font-size:21px;font-weight:600;line-height:1.32;color:#ece9ff;letter-spacing:-.3px;flex:1}

/* odds */
.odds-wrap{display:flex;flex-direction:column;gap:8px}
.bar-track{height:7px;border-radius:5px;background:#1a1a30;overflow:hidden;display:flex;gap:3px}
.bar-no{
  background:linear-gradient(90deg,#c0392b,#ff4757);
  border-radius:5px 0 0 5px;transition:width .5s ease;
}
.bar-yes{
  background:linear-gradient(90deg,#00a36c,#00d68f);
  border-radius:0 5px 5px 0;flex:1;
}
.odds-labels{display:flex;justify-content:space-between;font-size:12px;font-weight:700}
.lbl-no{color:var(--no)}.lbl-yes{color:var(--yes)}

/* payout boxes */
.payout-row{display:flex;gap:8px}
.pbox{flex:1;border-radius:16px;padding:13px 14px;display:flex;flex-direction:column;gap:4px;position:relative;overflow:hidden}
.pbox::after{content:'';position:absolute;inset:0;border-radius:16px;pointer-events:none}
.pbox-no{
  background:linear-gradient(135deg,rgba(255,71,87,.12),rgba(192,57,43,.05));
  border:1px solid rgba(255,71,87,.25);
}
.pbox-yes{
  background:linear-gradient(135deg,rgba(0,214,143,.12),rgba(0,163,108,.05));
  border:1px solid rgba(0,214,143,.25);
}
.pbox-dir{font-size:9px;letter-spacing:2px;text-transform:uppercase;font-weight:700}
.pbox-dir-no{color:var(--no)}.pbox-dir-yes{color:var(--yes)}
.pbox-desc{font-size:9px;color:#3a3a5a}
.pbox-amt{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:1px;line-height:1}
.pbox-amt-no{
  background:linear-gradient(135deg,var(--no),#ff8fa0);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.pbox-amt-yes{
  background:linear-gradient(135deg,var(--yes),#80ffce);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}

/* overlays */
.ov{position:absolute;inset:0;border-radius:var(--r);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none}
.ov-yes{background:linear-gradient(160deg,rgba(0,214,143,.1),transparent);border:2px solid var(--yes)}
.ov-no {background:linear-gradient(160deg,rgba(255,71,87,.1),transparent);border:2px solid var(--no)}
.ov-lbl{font-family:'Bebas Neue',sans-serif;font-size:80px;letter-spacing:6px;text-shadow:0 0 40px currentColor}
.ov-yes .ov-lbl{color:var(--yes);transform:rotate(-10deg)}
.ov-no  .ov-lbl{color:var(--no); transform:rotate(10deg)}

/* ── CONTROLS ── */
.controls{display:flex;flex-direction:column;gap:8px;flex-shrink:0}

.row{display:flex;gap:6px}

.chip{
  flex:1;padding:9px 0;border-radius:12px;cursor:pointer;
  font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;
  background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);
  color:var(--muted);transition:all .15s;
}
.chip.on{
  background:rgba(245,197,24,.1);border-color:rgba(245,197,24,.5);
  color:var(--gold);box-shadow:0 0 14px rgba(245,197,24,.15);
}

.mult{
  flex:1;padding:9px 0;border-radius:12px;cursor:pointer;
  font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;
  background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);
  color:var(--muted);transition:all .2s;
}
.mult.on{
  background:linear-gradient(135deg,var(--gold),var(--gold3));
  border-color:transparent;color:#06060f;
  box-shadow:0 4px 20px rgba(245,197,24,.3);
  transform:translateY(-1px);
}

.hint{text-align:center;font-size:11px;color:#333355;letter-spacing:.3px}
.hint b{color:var(--gold);font-weight:700}

/* action buttons */
.actions{display:flex;gap:7px}

.btn-no{
  flex:2;padding:15px 0;border-radius:18px;cursor:pointer;
  font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;
  background:linear-gradient(135deg,rgba(255,71,87,.14),rgba(192,57,43,.06));
  border:1.5px solid rgba(255,71,87,.4);color:var(--no);
  box-shadow:0 4px 24px rgba(255,71,87,.1);
  transition:all .15s;
}
.btn-pass{
  flex:1;padding:15px 0;border-radius:18px;cursor:pointer;
  font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:2px;
  background:rgba(255,255,255,.03);border:1.5px solid rgba(255,255,255,.07);
  color:#333355;transition:all .15s;
}
.btn-yes{
  flex:2;padding:15px 0;border-radius:18px;cursor:pointer;
  font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;
  background:linear-gradient(135deg,rgba(0,214,143,.14),rgba(0,163,108,.06));
  border:1.5px solid rgba(0,214,143,.4);color:var(--yes);
  box-shadow:0 4px 24px rgba(0,214,143,.1);
  transition:all .15s;
}
.btn-no:active  {background:rgba(255,71,87,.25); box-shadow:0 0 30px rgba(255,71,87,.3);transform:scale(.97)}
.btn-pass:active{background:rgba(255,255,255,.07);transform:scale(.97)}
.btn-yes:active {background:rgba(0,214,143,.25); box-shadow:0 0 30px rgba(0,214,143,.3);transform:scale(.97)}

/* toast */
.toast{
  position:fixed;top:90px;left:50%;
  transform:translateX(-50%) translateY(-12px);
  background:rgba(14,14,32,.9);backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.08);border-radius:100px;
  padding:10px 24px;font-size:13px;font-weight:600;
  opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;z-index:999;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* done */
.done{
  position:absolute;inset:0;border-radius:var(--r);
  background:linear-gradient(160deg,#14142c,#0a0a18);
  border:1px solid rgba(120,100,255,.15);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center;
}
.done-title{
  font-family:'Bebas Neue',sans-serif;font-size:52px;letter-spacing:5px;
  background:linear-gradient(135deg,var(--gold),var(--gold3));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 12px rgba(245,197,24,.4));
}
.done-sub{color:var(--muted);font-size:13px}
.btn-reset{
  padding:13px 36px;
  background:linear-gradient(135deg,var(--gold),var(--gold3));
  border:none;border-radius:100px;
  color:#06060a;font-family:'DM Sans',sans-serif;font-weight:700;font-size:14px;
  cursor:pointer;box-shadow:0 6px 24px rgba(245,197,24,.35);
  transition:transform .15s,box-shadow .15s;
}
.btn-reset:active{transform:scale(.97);box-shadow:0 2px 12px rgba(245,197,24,.2)}
</style>
</head>
<body>
<canvas id="bg"></canvas>

<div class="app">
  <div class="header">
    <div>
      <div class="logo">PropSwipe</div>
      <div class="logo-sub">Prediction Markets</div>
    </div>
    <div class="balance-pill">
      <div class="balance-label">Balance</div>
      <div class="balance-val" id="bal">$1,000</div>
    </div>
  </div>

  <div class="card-area">
    <div class="card-stack" id="stack">
      <div class="ghost ghost-2"></div>
      <div class="ghost ghost-1"></div>
      <div class="bet-card" id="card">
        <div class="ov ov-yes" id="ov-yes"><div class="ov-lbl">YES</div></div>
        <div class="ov ov-no"  id="ov-no" ><div class="ov-lbl">NO</div></div>
        <div class="card-shimmer"></div>
        <div class="card-body">
          <div class="card-top">
            <div class="badge" id="cat">Crypto</div>
            <div class="vol"  id="vol">Vol $4.2M</div>
          </div>
          <div class="question" id="q">Will Bitcoin reach $200k before end of 2025?</div>
          <div class="odds-wrap">
            <div class="bar-track">
              <div class="bar-no"  id="bar-no"  style="width:72%"></div>
              <div class="bar-yes" id="bar-yes"></div>
            </div>
            <div class="odds-labels">
              <span class="lbl-no"  id="lbl-no" >NO 72%</span>
              <span class="lbl-yes" id="lbl-yes">YES 28%</span>
            </div>
          </div>
          <div class="payout-row">
            <div class="pbox pbox-no">
              <div class="pbox-dir pbox-dir-no">← Swipe NO</div>
              <div class="pbox-desc">Betting it won't happen</div>
              <div class="pbox-amt pbox-amt-no" id="pay-no">Win $35</div>
            </div>
            <div class="pbox pbox-yes">
              <div class="pbox-dir pbox-dir-yes">Swipe YES →</div>
              <div class="pbox-desc">Betting it will happen</div>
              <div class="pbox-amt pbox-amt-yes" id="pay-yes">Win $89</div>
            </div>
          </div>
        </div>
      </div>
      <div class="done" id="done" style="display:none">
        <div class="done-title">ALL IN</div>
        <div class="done-sub">No more markets available</div>
        <button class="btn-reset" onclick="reset()">Play Again</button>
      </div>
    </div>
  </div>

  <div class="controls">
    <div class="row">
      <button class="chip"    onclick="setS(10,this)">$10</button>
      <button class="chip on" onclick="setS(25,this)">$25</button>
      <button class="chip"    onclick="setS(50,this)">$50</button>
      <button class="chip"    onclick="setS(100,this)">$100</button>
    </div>
    <div class="row">
      <button class="mult on" onclick="setM(1,this)">×1</button>
      <button class="mult"    onclick="setM(2,this)">×2</button>
      <button class="mult"    onclick="setM(5,this)">×5</button>
      <button class="mult"    onclick="setM(10,this)">×10</button>
    </div>
    <div class="hint">Betting <b id="eff">$25</b> — pick a side to place your bet</div>
    <div class="actions">
      <button class="btn-no"   onclick="bet(false)">← NO</button>
      <button class="btn-pass" onclick="pass()">PASS</button>
      <button class="btn-yes"  onclick="bet(true)">YES →</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ── PARTICLE BG ── */
(()=>{
  const cv=document.getElementById('bg'),ctx=cv.getContext('2d');
  let W,H,pts=[];
  function resize(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;init()}
  function init(){
    pts=[];
    const n=Math.floor(W*H/8000);
    for(let i=0;i<n;i++) pts.push({
      x:Math.random()*W, y:Math.random()*H,
      r:Math.random()*1.2+.2,
      sp:Math.random()*.3+.05,
      o:Math.random()*.5+.1,
      drift:(Math.random()-.5)*.2,
    });
  }
  function draw(){
    ctx.clearRect(0,0,W,H);
    const grd=ctx.createRadialGradient(W/2,H*.15,0,W/2,H*.15,H*.6);
    grd.addColorStop(0,'rgba(100,80,200,.06)');
    grd.addColorStop(.5,'rgba(245,197,24,.025)');
    grd.addColorStop(1,'transparent');
    ctx.fillStyle=grd;ctx.fillRect(0,0,W,H);
    pts.forEach(p=>{
      p.y-=p.sp; p.x+=p.drift;
      if(p.y<-2){p.y=H+2;p.x=Math.random()*W}
      if(p.x<-2)p.x=W+2; if(p.x>W+2)p.x=-2;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(200,180,255,${p.o})`;ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize',resize);
  resize(); draw();
})();

/* ── APP ── */
const BETS=[
  {q:"Will Bitcoin reach $200k before end of 2025?",    cat:"Crypto",  vol:"Vol $4.2M",yp:.28},
  {q:"Will the Fed cut rates at least 3× in 2025?",     cat:"Finance", vol:"Vol $6.7M",yp:.61},
  {q:"Will there be a declared US recession in 2025?",  cat:"Economy", vol:"Vol $3.1M",yp:.38},
  {q:"Will Elon Musk leave as Tesla CEO by end of 2026?",cat:"Tech",   vol:"Vol $1.8M",yp:.14},
];

let bal=1000,idx=0,stake=25,mult=1,dx=0,sx=0,drag=false;

const card=document.getElementById('card');
const ovY=document.getElementById('ov-yes');
const ovN=document.getElementById('ov-no');
const done=document.getElementById('done');

const $=id=>document.getElementById(id);

function eff(){return stake*mult}

function sync(){
  if(idx>=BETS.length){
    card.style.display='none';
    document.querySelectorAll('.ghost').forEach(g=>g.style.display='none');
    done.style.display='flex';return;
  }
  const b=BETS[idx],e=eff();
  const yp=Math.round(e/b.yp),np=Math.round(e/(1-b.yp)),noP=1-b.yp;
  $('cat').textContent=b.cat; $('vol').textContent=b.vol;
  $('q').textContent=b.q;
  $('bar-no').style.width=(noP*100)+'%';
  $('lbl-no').textContent='NO '+Math.round(noP*100)+'%';
  $('lbl-yes').textContent='YES '+Math.round(b.yp*100)+'%';
  $('pay-no').textContent='Win $'+np;
  $('pay-yes').textContent='Win $'+yp;
  $('eff').textContent='$'+e;
}

function syncBal(){$('bal').textContent='$'+bal.toLocaleString()}

function toast(msg,col){
  const t=$('toast');t.textContent=msg;t.style.color=col;t.style.borderColor=col+'33';
  t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1900);
}

function fly(dir,cb){
  card.classList.add('snap');
  card.style.transform=`translateX(${dir*540}px) rotate(${dir*18}deg)`;
  card.style.opacity='0';
  setTimeout(()=>{
    card.classList.remove('snap');
    card.style.transform=card.style.opacity='';
    ovY.style.opacity=ovN.style.opacity='0';
    idx++;sync();dx=0;cb&&cb();
  },360);
}

function bet(yes){
  if(idx>=BETS.length)return;
  const e=eff();
  if(e>bal){toast('Not enough balance','#FF4757');return}
  const b=BETS[idx],pay=yes?Math.round(e/b.yp):Math.round(e/(1-b.yp));
  bal-=e;syncBal();
  const el=$('bal');el.classList.remove('flash');void el.offsetWidth;el.classList.add('flash');
  toast((yes?'✅ Bet YES':'❌ Bet NO')+' · to win $'+pay,yes?'#00D68F':'#FF4757');
  fly(yes?1:-1);
}

function pass(){
  if(idx>=BETS.length)return;
  toast('⏭ Skipped','#4a4a6a');fly(1);
}

function setS(s,el){
  stake=s;
  document.querySelectorAll('.chip').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');sync();
}

function setM(m,el){
  mult=m;
  document.querySelectorAll('.mult').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');sync();
}

function reset(){
  bal=1000;idx=0;stake=25;mult=1;
  card.style.display='';
  document.querySelectorAll('.ghost').forEach(g=>g.style.display='');
  done.style.display='none';
  document.querySelectorAll('.chip').forEach((b,i)=>b.classList.toggle('on',i===1));
  document.querySelectorAll('.mult').forEach((b,i)=>b.classList.toggle('on',i===0));
  syncBal();sync();
}

/* drag */
function dn(e){drag=true;sx=e.type==='touchstart'?e.touches[0].clientX:e.clientX;dx=0}
function mv(e){
  if(!drag)return;
  dx=(e.type==='touchmove'?e.touches[0].clientX:e.clientX)-sx;
  card.style.transform=`translateX(${dx}px) rotate(${dx*.07}deg)`;
  const p=Math.min(Math.abs(dx)/110,1);
  if(dx>0){ovY.style.opacity=p;ovN.style.opacity=0}
  else    {ovN.style.opacity=p;ovY.style.opacity=0}
}
function up(){
  if(!drag)return;drag=false;
  if(Math.abs(dx)>100){bet(dx>0)}
  else{card.classList.add('snap');card.style.transform='';ovY.style.opacity=ovN.style.opacity=0;setTimeout(()=>card.classList.remove('snap'),350)}
  dx=0;
}
card.addEventListener('mousedown',dn);
card.addEventListener('touchstart',dn,{passive:true});
window.addEventListener('mousemove',mv);
window.addEventListener('touchmove',mv,{passive:true});
window.addEventListener('mouseup',up);
window.addEventListener('touchend',up);

sync();
</script>
</body>
</html>
